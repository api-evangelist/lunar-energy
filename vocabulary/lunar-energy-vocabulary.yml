vocabulary: Lunar Energy / Gridshare DERMS Vocabulary
specification: API Commons Vocabulary
specificationVersion: '0.1'
provider: Lunar Energy
providerId: lunar-energy
created: '2026-05-25'
modified: '2026-05-25'
description: >-
  Normative vocabulary for Lunar Energy's Gridshare grid-edge DERMS and
  Lunar System home battery. Maps Gridshare-specific terms to standard
  energy-industry concepts, schema.org, and qudt unit URIs.
sources:
  - https://www.lunarenergy.com
  - https://www.lunarenergy.com/lunar-system
  - https://www.gridshare.com
  - https://developers.gridshare.com
domains:
  - name: Hardware
    terms:
      - term: Lunar Battery
        definition: Modular 15–30 kWh wall-mounted lithium-ion battery, 9.6 kW continuous / 15 kW peak (5s) output, 12.5-year warranty.
      - term: Lunar Inverter
        definition: Hybrid solar inverter component of the Lunar System.
      - term: Lunar Maximizer
        definition: 650 W module-level power optimizer that attaches to each solar panel; isolates panel-level shading and mismatch losses.
      - term: Lunar Bridge
        definition: 200 A meter socket adapter that interfaces the Lunar System to the home's grid connection.
      - term: AbleEdge
        definition: Eaton AbleEdge smart breakers used in the Lunar System for automatic load-shedding during outages.
      - term: Lunar App
        definition: Mobile application for monitoring and controlling the Lunar System.
      - term: Lunar AI
        definition: Per-home optimization model that produces daily energy plans from utility rates, weather forecasts, and historical home load patterns.
  - name: Identifiers
    terms:
      - term: siteId
        definition: Stable identifier for a single physical site (typically a residence) in Gridshare.
      - term: synthId
        definition: Synthetic identifier — the canonical ID used for devices and sensors. May refer to a physical device or a derived sensor stream such as <deviceId>__GRID_METER_DERIVED, <deviceId>__bb_agg, or <deviceId>__PV_DERIVED.
      - term: deviceId
        definition: Manufacturer or installation-time identifier for a device, when distinct from its synthId.
      - term: flexGroupId
        definition: Identifier for a cohort of DERs participating in a flex program.
      - term: flexEventId
        definition: Identifier for a single dispatch event in a flex program.
      - term: prognosisId
        definition: Identifier for a forecasted aggregate power profile for a flex group.
  - name: Device Kinds
    terms:
      - term: inverter
        definition: Solar/battery hybrid inverter.
      - term: battery_pack
        definition: Battery storage device.
      - term: PV
        definition: Photovoltaic array.
      - term: EV
        definition: Electric vehicle (typically with managed charging).
      - term: meter
        definition: Revenue or grid-side meter.
      - term: load_control_relay
        definition: Smart breaker or relay capable of switching circuit loads.
  - name: Topology
    terms:
      - term: sensor
        definition: A node in a site's topology tree that exposes time-series data via the telemetry endpoint. Identified by an id and a channels array describing available streams.
      - term: channels
        definition: The data streams available from a sensor (e.g. real power, reactive power, voltage, current, state of charge).
  - name: Operation Mode
    terms:
      - term: Simple
        definition: Device follows the simplest possible plan for its kind.
      - term: Schedule
        definition: Device follows a periodical (recurring) plan.
      - term: Smart
        definition: Device follows the AI-optimized smart plan generated by Lunar AI and Gridshare forecasting.
      - term: Unknown
        definition: The device's current operation mode cannot be determined.
  - name: Plans and Tariffs
    terms:
      - term: Overlay Plan
        definition: A short-term sequence of dispatch commands that overlays the device's normal plan. Cleared by sending an empty commands array.
      - term: Periodical Tariff
        definition: A recurring time-of-use tariff defined by pricing periods with exceptions. Periods cannot leave gaps.
      - term: Dynamic Tariff
        definition: A timeseries tariff paginated in 7-day windows. PATCH appends or overrides periods without deleting existing values.
      - term: Pricing Period
        definition: A start/end window within a tariff during which a specific price schedule applies. The latest period may be open-ended.
  - name: Flex and VPP
    terms:
      - term: Flex Group
        definition: A cohort of participating DERs, typically defined by retailer, geography, or program.
      - term: Flex Event
        definition: A scheduled coordinated dispatch action targeting a flex group. flatDispatch holds a flat aggregate power profile across a window.
      - term: Flex Dispatch
        definition: An active execution of a flex event against participants. Participants may opt out via the opt-out endpoint.
      - term: Prognosis
        definition: A forecasted power profile for a flex group, aggregated from per-participant forecasts at their settlement points.
      - term: Prognosis Diff Request
        definition: A request to modify a prognosis profile by submitting a differential profile. Asynchronous; status is polled.
      - term: Prognosis Diff Order
        definition: A confirmed commitment to an offered prognosis diff; commands are dispatched to underlying devices.
      - term: Counterfactual
        definition: An alternate telemetry stream representing what a device would have done if it had not been smartly controlled. Used for measurement and verification.
      - term: Settlement Point
        definition: The market node at which a participant's flex contribution is metered and settled.
  - name: Energy Accounting
    terms:
      - term: energy_Wh_increment
        definition: Lifetime cumulative energy flowing INTO the device, positive watt-hours. Populated only when include=energy is requested. May be reset in exceptional circumstances.
      - term: energy_Wh_decrement
        definition: Lifetime cumulative energy flowing OUT of the device, negative watt-hours. Populated only when include=energy is requested.
  - name: Authentication
    terms:
      - term: Partner Cognito Pool
        definition: Amazon Cognito user pool gridshare-partner[-prod|-dev0][-us-west-1] used for client-credentials OAuth flow.
      - term: Customer Cognito Pool
        definition: Amazon Cognito user pool lunar-customer-prod-us-west-1 used for OAuth Authorization Code flow on behalf of homeowners.
      - term: lunar/device.read
        definition: OAuth scope — read device metadata and telemetry, excluding plans.
      - term: lunar/device.write
        definition: OAuth scope — modify devices including operation mode.
      - term: lunar/plan.read
        definition: OAuth scope — read existing device plans.
      - term: lunar/plan.write
        definition: OAuth scope — send plans to a device.
