aid: lunar-energy
name: Lunar Energy
description: >-
  Lunar Energy is a Mountain View, California-based residential clean-energy company founded in August 2020 by former
  Tesla Energy executive Kunal Girotra. The company designs and manufactures the Lunar System — a modular home battery
  (15–30 kWh, 9.6 kW continuous / 15 kW peak), Lunar Inverter, Lunar Maximizers (module-level power optimizers), Lunar
  Bridge meter socket adapter, and Eaton AbleEdge smart-breaker integration — controlled by the Lunar App with Lunar AI
  optimization. Its Gridshare platform is a grid-edge DERMS (Distributed Energy Resource Management System) and virtual
  power plant engine that manages 130,000+ residential distributed energy resources representing 1.2 GWh of connected
  storage across multiple manufacturers and third-party operators. Gridshare powers utility demand response and VPP
  programs through flex groups, flex dispatches, prognoses, dynamic and periodical tariffs, and per-device remote
  operation-mode control. Lunar Energy is backed by SunPower and Sunrun partnerships; SoftBank Energy is a major
  investor. The Gridshare Partner API and Customer API are gated behind business onboarding — credentials are issued by
  Lunar Energy after contacting developers@gridshare.com.
