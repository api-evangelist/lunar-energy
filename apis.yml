apis:
  - aid: lunar-energy:gridshare-partner-api
    name: Gridshare Partner API
    tags:
      - Partner
      - Fleet Management
      - Virtual Power Plant
      - Flex Groups
      - Flex Events
      - Tariffs
      - Devices
      - Sites
    humanURL: https://developers.gridshare.com/reference/authentication
    properties:
      - type: Documentation
        url: https://developers.gridshare.com/reference/authentication
      - type: Documentation
        url: https://developers.gridshare.com/reference/fleet-management
      - type: Documentation
        url: https://developers.gridshare.com/reference/vpp
      - type: OpenAPI
        url: openapi/gridshare-partner-api-openapi.yml
    description: >-
      The Gridshare Partner API is the operator-facing surface for utilities, DER aggregators, and energy retailers to
      manage residential distributed energy resources at fleet scale. v1 endpoints cover Sites, Devices, Telemetry,
      Operation Mode, Overlay Plans, Periodical Tariffs, Dynamic Tariffs, Flex Groups (participants and bulk
      membership), Flex Events and Flex Dispatch opt-outs, Prognoses with Diff Requests and Diff Orders,
      Counterfactuals, and on-site Visits. Authenticated via OAuth 2.0 client-credentials against Amazon Cognito; tokens
      expire after 1 hour. Regional production servers are developer-api.partner.us.mygridshare.com (US) and
      developer-api.partner.mygridshare.com (rest of world).
  - aid: lunar-energy:gridshare-customer-api
    name: Gridshare Customer API
    tags:
      - Customer
      - Home Energy Management
      - Devices
      - Telemetry
      - Topology
      - Operation Mode
      - Overlay Plans
    humanURL: https://developers.gridshare.com/reference/authentication-customer
    properties:
      - type: Documentation
        url: https://developers.gridshare.com/reference/authentication-customer
      - type: Documentation
        url: https://developers.gridshare.com/reference/topology-key-concepts
      - type: Documentation
        url: https://developers.gridshare.com/reference/telemetry-key-concepts
      - type: Documentation
        url: https://developers.gridshare.com/reference/energy-management
      - type: OpenAPI
        url: openapi/gridshare-customer-api-openapi.yml
    description: >-
      The Gridshare Customer API is the homeowner-delegated surface for partners that need to read or control devices on
      behalf of a specific Lunar Energy customer. It implements OAuth 2.0 Authorization Code flow against the
      lunar-customer Amazon Cognito user pool with four scopes — `lunar/device.read`, `lunar/device.write`,
      `lunar/plan.read`, `lunar/plan.write`. v2 endpoints expose lightweight Site listing, Site Topology (a sensor tree
      usable to drive telemetry queries), Device listing and retrieval, Telemetry (per-sensor time-bucketed readings
      with energy_Wh_increment / energy_Wh_decrement when include=energy), Operation Mode (Simple / Schedule / Smart),
      Overlay Plans for short-term device control, and partial device updates. Production servers
      developer-api.customer.mygridshare.com.
  - aid: lunar-energy:gridshare-remote-mcp
    name: Gridshare Remote MCP Server
    tags:
      - MCP
      - Model Context Protocol
      - Remote MCP
      - AI Agents
      - Customer
    humanURL: https://developers.gridshare.com/reference/customer-remote-mcp
    properties:
      - type: Documentation
        url: https://developers.gridshare.com/reference/customer-remote-mcp
    description: >-
      Gridshare publishes a remote Model Context Protocol (MCP) server that exposes the Customer API as MCP tools for AI
      agents. Authenticated with the same Cognito-issued bearer tokens as the Customer API.
